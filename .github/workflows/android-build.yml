name: Build Android App
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择打包类型 (Build Type)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - aab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android Platform
        run: npx cap add android

      - name: Capacitor Sync
        run: npx cap sync android

      # ==========================================
      # 公共步骤：准备 Release 环境 (仅 Release APK 和 AAB 需要)
      # ==========================================
      - name: Prepare Release Environment
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'aab'
        run: |
          # 1. 动态开启代码混淆和资源压缩
          sed -i 's/minifyEnabled false/minifyEnabled true\n            shrinkResources true/' android/app/build.gradle
          
          # 2. 补齐签名插件所需的 29.0.3 构建工具 (自动同意协议并下载)
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3"

      # ==========================================
      # 选项 1: Debug APK
      # ==========================================
      - name: Build Debug APK
        if: github.event_name == 'push' || github.event.inputs.build_type == 'debug'
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK
        if: github.event_name == 'push' || github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # ==========================================
      # 选项 2: Release APK
      # ==========================================
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign Release APK
        if: github.event.inputs.build_type == 'release'
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: ${{steps.sign_apk.outputs.signedReleaseFile}}

      # ==========================================
      # 选项 3: Release AAB
      # ==========================================
      - name: Build Release AAB
        if: github.event.inputs.build_type == 'aab'
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Sign Release AAB
        if: github.event.inputs.build_type == 'aab'
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed Release AAB
        if: github.event.inputs.build_type == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-aab
          path: ${{steps.sign_aab.outputs.signedReleaseFile}}
